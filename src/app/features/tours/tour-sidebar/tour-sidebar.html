<aside class="flex h-full min-h-0 w-full flex-col border-r border-secondary-light p-4">
  <div class="min-h-0 flex-1 overflow-y-auto pr-1">
    <tour-list (editTour)="openEditTourModal($event)"></tour-list>
  </div>

  <button
    class="mt-3 w-full shrink-0 rounded bg-[#1e3a5f] px-4 py-2 text-sm font-medium text-white hover:bg-[#16304f]"
    (click)="openAddTourModal()"
  >
    + Add New Tour
  </button>

  <app-add-tour-modal
    [isOpen]="isModalOpen"
    [editTour]="editingTour"
    (close)="closeModal()"
    (save)="handleSaveTour($event)"
  ></app-add-tour-modal>
</aside>
