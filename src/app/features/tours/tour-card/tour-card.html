<div class="rounded-lg border border-secondary-light bg-white p-3 shadow-sm transition-shadow hover:shadow-md mb-3"
  (click)="selectTour(tour)"
  [ngClass]="vm.selectedTour()?.id === tour.id ? 'bg-primary-bg' : 'bg-white'"
  >
  <div class="text-base font-bold text-primary">
    {{ tour.name }}
  </div>
  <div class="text-sm text-gray-600">
    <span>{{ tour.distance }} km</span>
    <span class="mx-1">•</span>
    <span>{{ tour.estimatedTime | duration }}</span>
    <span class="mx-1">•</span>
    <span>{{ tour.transportType }}</span>
  </div>
</div>
